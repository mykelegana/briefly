<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Briefly AI</title>

    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <div class="app">

        <header>
            <h1>Briefly</h1>
            <p>Extract context from conversations</p>
        </header>


        <main id="chat">

            <div class="message ai">
                Hello 👋 I'm Briefly. Paste your previous conversation here!
            </div>

        </main>


        <form id="chat-form">

            <textarea
                id="input"
                placeholder="Paste conversation here..."
            ></textarea>


            <button>
                Send
            </button>

        </form>

    </div>


    <script src="./main.js"></script>

</body>

</html>
