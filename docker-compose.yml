services:
  server:
    build:
      context: ./backend/
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d briefly-postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  pgadmin:
    profiles:
      - admin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"

volumes:
  postgres_data:
    